<!DOCTYPE html>
<html lang="it" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSDev Tools</title>
    <link rel="stylesheet" href="input.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/basecoat.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/popover.min.js" defer></script>
    <script type="module" src="app.js" defer></script>
</head>
<body class="min-h-screen antialiased">
    <nav class="relative">
    <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
        <div class="relative flex h-16 items-center justify-between">
            <!-- Title -->
            <div class="flex flex-1 items-stretch justify-start">
                <h1 class="flex shrink-0 items-center font-semibold pl-2">
                    OSDev Tools <span class="badge select-none ml-2">Beta</span>
                </h1>
            </div>
            <div class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:inset-auto sm:ml-6 sm:pr-0 gap-2">
                <!-- Update button -->
                <button id="update-app-btn" type="button" class="btn-outline h-8 gap-1 text-green-600 dark:text-green-400 animate-ping-button hidden"
                    data-tooltip="A new version of the app is available" data-side="bottom">
                    <i data-lucide="arrow-up"></i>Update
                </button>
                <div class="button-group">
                    <!-- Theme toggle button -->
                    <button type="button" aria-label="Toggle dark mode" data-tooltip="Toggle dark mode" data-side="bottom" onclick="document.dispatchEvent(new CustomEvent('basecoat:theme'))" class="btn-icon-outline size-8">
                        <span class="hidden dark:block"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" /></svg></span>
                        <span class="block dark:hidden"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" /></svg></span>
                    </button>
                    <!-- Layout toggle button -->
                    <button id="layout-toggle-btn" type="button" class="btn-outline size-8 hidden xl:flex" data-tooltip="Toggle layout" data-side="bottom">
                        <i id="layout-toggle-columns" data-lucide="columns-2"></i>
                        <i id="layout-toggle-wide" data-lucide="rows-2"></i>
                    </button>
                    <div id="tools-filter-div" class="popover">
                        <!-- Tool filter button -->
                        <button id="tools-filterv-trigger" type="button" aria-expanded="false" aria-controls="tools-filter-popover" class="btn-outline size-8">
                            <i data-lucide="settings-2"></i>
                        </button>
                        <!-- Tool filter popover -->
                        <div id="tools-filter-popover" data-popover data-side="left" aria-hidden="true" class="w-80">
                            <div class="grid gap-4">
                                <header class="grid gap-1.5">
                                    <p class="text-muted-foreground text-sm">Filter tools by architecture, type and more.</p>
                                </header>
                                <form class="grid gap-3">
                                    <div id="tools-filter-container" class="grid gap-2">
                                        <!-- Tool filters container to be populated by app.js -->
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- GitHub repo link -->
                <a class="btn-icon size-8" href="https://github.com/rickyadastra/osdev-tools" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
                </a>
            </div>
        </div>
    </div>
    </nav>

    <main class="overflow-y-auto flex-1">
        <div class="mx-auto max-w-6xl py-2 px-2 sm:py-4 sm:px-10 space-y-4">
            <!-- Tools container to be populated by app.js -->
            <div id="tools-container" class="columns-1 xl:columns-2 gap-4 space-y-4"></div>
        </div>
        <!-- Tools container empty message -->
        <div id="tools-container-none" class="flex min-w-0 flex-1 flex-col items-center gap-6 p-6 text-center text-balance hidden">
            <header class="flex max-w-sm flex-col items-center gap-2 text-center">
                <h3 class="text-lg font-medium tracking-tight">
                    Page Fault!</h3>
                <p class="text-muted-foreground text-sm/relaxed max-w-sm">
                There are no tools for the filters you have chosen. Try changing them in the 
                <i class="inline size-4" data-lucide="settings-2"></i> 
                filter panel or reset them.
                </p>
                <button class="btn-outline mt-4" id="tools-filter-reset">Reset filters</button>
            </header>
        </div>
        <!-- Page footer -->
        <div class="flex flex-col items-center pt-10 select-none pb-10">
            <p class="text-sm text-muted-foreground">
                Made by 
                <button class="btn-link p-0 h-auto" onclick="window.open('https://github.com/rickyadastra', '_blank')">rickyadastra</button>
            </p>
            <button id="footer-version" class="btn-link text-sm text-muted-foreground/35 hover:text-muted-foreground/85 hover:no-underline pt-4"></button>
        </div>
    </main>

    <!-- Changelog dialog -->
    <dialog id="dialog-changelog" class="dialog w-full sm:max-w-[425px] max-h-[612px]">
        <div class="top-[11rem]">
            <header class="flex flex-row items-center">
                <i data-lucide="sparkles" class="size-5"></i>
                <h2 id="changelog-title">What's new</h2>
            </header>
            <section class="text-md text-foreground">
                <p id="changelog-body">Lorem Ipsum changes.</p>
                <ul id="changelog-list" class="list-disc pl-5 space-y-0.5 pt-4 text-sm text-muted-foreground">
                </ul>
            </section>
            <footer class="pt-2 justify-start items-baseline">
                <p id="changelog-version" class="text-muted-foreground text-xs">0.1.0</p>
            </footer>

            <button id="changelog-close-btn" type="button" onclick="this.closest('dialog').close()">
                <i data-lucide="x"></i>
            </button>
        </div>
        </dialog>
</body>
</html>
