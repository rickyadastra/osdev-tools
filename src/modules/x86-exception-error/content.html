<section>
    <div class="form grid gap-6 md:gap-4">
        <div class="gap-4 flex flex-col md:gap-2 md:flex-row">
            <!-- Error Type -->
            <div class="grid gap-2">
                <label for="exception-type">Type</label>
                <select id="exception-type" class="w-auto">
                    <option value="page-fault" selected>Page Fault</option>
                    <option value="segment-selector">Segment Selector</option>
                </select>
            </div>
            <!-- Error Code -->
            <div id="error-code-div" class="grid gap-2 grow" data-side="bottom" data-align="start">
                <label for="error-code">Error Code</label>
                <input type="text" id="error-code" class="font-mono" placeholder="0x00000001">
            </div>
        </div>
        <!-- Breakdown -->
        <div class="gap-4 flex flex-col md:gap-2">
            <div class="grid gap-2">
                <p class="label">Breakdown</p>
                <div id="bitfield"></div>
            </div>
            <div id="desc-div" class="alert">
                <i data-lucide="info"></i>
                <h2 id="desc-title">Click on a field to get more info</h2>
                <section>
                    <div id="desc-body"></div>
                    <div id="desc-value-div" class="flex flex-row w-full hidden">
                        <div class="button-group grow">
                            <input id="desc-value" class="input h-8 rounded-r-none grow text-sm" type="text" placeholder="Field value" readonly>
                            <button id="copy-hex-btn" class="btn-outline size-8" data-side="bottom" data-tooltip="Copy Hex"><i data-lucide="copy"></i></button>
                            <button id="copy-dec-btn" class="btn-outline size-8" data-side="bottom" data-tooltip="Copy Decimal"><i data-lucide="hash"></i></button>
                            <button id="copy-bin-btn" class="btn-outline size-8" data-side="bottom" data-tooltip="Copy Binary"><i data-lucide="binary"></i></button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</section>
<footer>
    <!-- Resources -->
    <h3 class="label text-muted-foreground mr-4">Resources</h3>
    <div class="flex flex-row overflow-x-auto scrollbar gap-1">
        <a href="https://wiki.osdev.org/Exceptions" target="_blank" class="badge-outline">
            Exceptions (OSDev Wiki)
            <i data-lucide="arrow-up-right" class="size-4"></i>
        </a>
        <a href="https://en.wikipedia.org/wiki/Software_Guard_Extensions" target="_blank" class="badge-outline">
            SGX (Wikipedia)
            <i data-lucide="arrow-up-right" class="size-4"></i>
        </a>
    </div>
</footer>
